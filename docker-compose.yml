services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bigback}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-bigback}
    ports:
      - "5432:5432"
    volumes:
      - bigback_postgres_data:/var/lib/postgresql/data

volumes:
  bigback_postgres_data:
