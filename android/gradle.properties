# Public API base (no trailing slash needed). Overridden by local.properties for per-machine dev.
# Local emulator → host machine: http://10.0.2.2:3000
MAILLARDMAP_API_BASE_URL=https://bigback-production.up.railway.app

# Required when the app uses AndroidX (Compose, etc.)
android.useAndroidX=true
android.nonTransitiveRClass=true

# Default 512 MiB is too small for AGP + Kotlin; daemon dies with GC thrashing.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx2048m

org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
