name: BigBack
options:
  bundleIdPrefix: com.maillardmap
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BigBack:
    type: application
    platform: iOS
    sources:
      - path: BigBack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maillardmap.app
        INFOPLIST_FILE: BigBack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: HCFN7QP772
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_USER_SCRIPTS: YES
